<h1 id="reportTitle"></h1>

<div id="viewDiv" style="
  width:100%;
  height:600px;
  border:1px solid #999;
"></div>

<div style="clear:both;"></div>

<br><br>

<div id="legendDiv" style="
  width:600px;
  border:1px solid #ccc;
  padding:10px;
  background:white;
"></div>

<br><br>

<h2>Parcel Information</h2>

<table id="parcelTable"
       border="1"
       cellpadding="5"
       cellspacing="0"
       style="
         border-collapse:collapse;
         width:100%;
       ">
  <thead>
    <tr>
      <th>Parcel Number</th>
      <th>Property Street</th>
      <th>Acres</th>
      <th>Full Name</th>
      <th>Name Extra</th>
      <th>Owner Mailing Address</th>
    </tr>
  </thead>

  <tbody id="parcelTableBody">
    <tr>
      <td colspan="6">Loading...</td>
    </tr>
  </tbody>
</table>

<script src="https://js.arcgis.com/4.30/"></script>

<script>

// Title
document.getElementById("reportTitle").textContent =
  "Parcel Map Export: " + new Date().toLocaleDateString();

require([
  "esri/WebMap",
  "esri/views/MapView",
  "esri/widgets/Legend"
  "esri/layers/FeatureLayer"
], function(
  WebMap,
  MapView,
  Legend,
  FeatureLayer
){

  const webmap = new WebMap({
    portalItem: {
      id: "ca12623310a1476eb369b7cfebfbdcb9"
    }
  });

  const view = new MapView({
    container: "viewDiv",
    map: webmap,
    ui: {
      components: []
    }
  });

view.when(function(){

  new Legend({
    view: view,
    container: "legendDiv"
  });

  const infoLayer = webmap.allLayers.find(
    layer => layer.title === "Oceana Parcels Information"
  );

  infoLayer.queryFeatures({
    where: "1=1",
    outFields: [
      "Parcel_Number",
      "Prop_Street",
      "Acres",
      "Full_Name",
      "Name_Extra",
      "Owner_Addres",
      "Owner_City",
      "Owner_State",
      "Owner_ZIP"
    ],
    returnGeometry: false
  }).then(function(result){

    const tbody = document.getElementById("parcelTableBody");

    tbody.innerHTML = "";

    result.features.forEach(function(feature){

      const a = feature.attributes;

      const row = `
        <tr>
          <td>${a.Parcel_Number || ""}</td>
          <td>${a.Prop_Street || ""}</td>
          <td>${a.Acres || ""}</td>
          <td>${a.Full_Name || ""}</td>
          <td>${a.Name_Extra || ""}</td>
          <td>
            ${a.Owner_Addres || ""}<br>
            ${a.Owner_City || ""} ${a.Owner_State || ""} ${a.Owner_ZIP || ""}
          </td>
        </tr>
      `;

      tbody.insertAdjacentHTML("beforeend", row);

    });

  });

});

</script>
