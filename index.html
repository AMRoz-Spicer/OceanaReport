<h1 id="reportTitle"></h1>

<div id="viewDiv" style="
  width:100%;
  height:600px;
  border:1px solid #999;
"></div>

<div style="clear:both;"></div>

<br><br>

<div id="legendDiv" style="
  width:600px;
  border:1px solid #ccc;
  padding:10px;
  background:white;
"></div>

<br><br>

<h2>Parcel Information</h2>

<table id="parcelTable"
       border="1"
       cellpadding="5"
       cellspacing="0"
       style="
         border-collapse:collapse;
         width:100%;
       ">
  <thead>
    <tr>
      <th>Parcel Number</th>
      <th>Property Street</th>
      <th>Acres</th>
      <th>Full Name</th>
      <th>Name Extra</th>
      <th>Owner Mailing Address</th>
    </tr>
  </thead>

  <tbody id="parcelTableBody">
    <tr>
      <td colspan="6">Loading...</td>
    </tr>
  </tbody>
</table>

<script src="https://js.arcgis.com/4.30/"></script>

<script>

// Title
document.getElementById("reportTitle").textContent =
  "Parcel Map Export: " + new Date().toLocaleDateString();

require([
  "esri/WebMap",
  "esri/views/MapView",
  "esri/widgets/Legend"
], function(
  WebMap,
  MapView,
  Legend
){

  const webmap = new WebMap({
    portalItem: {
      id: "ca12623310a1476eb369b7cfebfbdcb9"
    }
  });

  const view = new MapView({
    container: "viewDiv",
    map: webmap
  });

  view.when(function(){

    new Legend({
      view: view,
      container: "legendDiv"
    });

    // TEMP TEST ROW
    document.getElementById("parcelTableBody").innerHTML = `
      <tr>
        <td>123-45-678-000</td>
        <td>123 Main St</td>
        <td>40</td>
        <td>John Smith</td>
        <td>Trust</td>
        <td>
          123 Main St<br>
          Saginaw MI 48603
        </td>
      </tr>
    `;

  });

});

</script>
