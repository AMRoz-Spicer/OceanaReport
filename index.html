<body>

<h1 id="reportTitle">Parcel Map Export:</h1>

<script src="https://js.arcgis.com/4.30/"></script>

<script>

require([
  "esri/WebMap"
], function(WebMap){

  const webmap = new WebMap({
    portalItem: {
      id: "ca12623310a1476eb369b7cfebfbdcb9"
    }
  });

  webmap.load()
    .then(function(){
      alert("WebMap Loaded");
    })
    .catch(function(error){
      alert(error.message);
    });

});

</script>

</body>
