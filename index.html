<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Parcel Map Export</title>

<link rel="stylesheet"
      href="https://js.arcgis.com/4.30/esri/themes/light/main.css">

<script src="https://js.arcgis.com/4.30/"></script>

  alert("Script started");

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      color: #222;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 16px;
    }

    #mapWrapper {
      position: relative;
      width: 100%;
      height: 575px;
      border: 1px solid #999;
      margin-bottom: 10px;
    }

    #viewDiv {
      width: 100%;
      height: 100%;
    }

    .north-arrow {
      position: absolute;
      top: 16px;
      right: 16px;
      background: white;
      border: 1px solid #777;
      padding: 8px 10px;
      font-weight: bold;
      text-align: center;
      z-index: 10;
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    }

    .north-arrow .arrow {
      font-size: 24px;
      line-height: 20px;
    }

    #mapExtras {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      margin: 12px 0 24px 0;
    }

    #scaleBarDiv {
      min-width: 180px;
    }

    #legendDiv {
      max-width: 350px;
      border: 1px solid #ccc;
      padding: 8px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
      font-size: 13px;
    }

    th {
      background: #e8e8e8;
      text-align: left;
      border: 1px solid #999;
      padding: 6px;
    }

    td {
      border: 1px solid #999;
      padding: 6px;
      vertical-align: top;
    }

    #printBtn {
      margin-bottom: 16px;
      padding: 8px 14px;
      cursor: pointer;
    }

    @media print {
      #printBtn {
        display: none;
      }

      body {
        margin: 0.4in;
      }

      #mapWrapper {
        height: 500px;
        page-break-inside: avoid;
      }

      #mapExtras {
        page-break-inside: avoid;
      }

      table {
        page-break-inside: auto;
      }

      tr {
        page-break-inside: avoid;
        page-break-after: auto;
      }
    }
  </style>
</head>

<body>

  <button id="printBtn" onclick="window.print()">Print / Save as PDF</button>

  <h1 id="reportTitle">Parcel Map Export:</h1>

  <div id="mapWrapper">
    <div id="viewDiv"></div>

    <div class="north-arrow">
      <div class="arrow">▲</div>
      <div>N</div>
    </div>
  </div>

  <div id="mapExtras">
    <div>
      <strong>Scale</strong>
      <div id="scaleBarDiv"></div>
    </div>

    <div>
      <strong>Legend</strong>
      <div id="legendDiv"></div>
    </div>
  </div>

  <h2>Parcel Information</h2>

  <table>
    <thead>
      <tr>
        <th>Parcel Number</th>
        <th>Property Street</th>
        <th>Acres</th>
        <th>Full Name</th>
        <th>Name Extra</th>
        <th>Owner Mailing Address</th>
      </tr>
    </thead>
    <tbody id="parcelTableBody">
      <tr>
        <td colspan="6">Loading...</td>
      </tr>
    </tbody>
  </table>

  <script>
    require([
      "esri/WebMap",
      "esri/views/MapView",
      "esri/layers/FeatureLayer",
      "esri/widgets/Legend",
      "esri/widgets/ScaleBar",
      "esri/Graphic"
    ], function(
      WebMap,
      MapView,
      FeatureLayer,
      Legend,
      ScaleBar,
      Graphic
    ) {

      // -------------------------------
      // UPDATE THESE VALUES
      // -------------------------------

      const WEBMAP_ID = "ca12623310a1476eb369b7cfebfbdcb9";

      // If these layers/tables are already in the web map, leave URLs blank.
      // If the script cannot find them by title, paste the REST URLs here.
      const PARENT_LAYER_URL = "";
      const RELATED_TABLE_URL = "";

      const PARENT_LAYER_TITLE = "OceanaMichigan_Parcels";
      const RELATED_TABLE_TITLE = "OceanaParcel_Information";
      const JOINED_VIEW_TITLE = "Oceana Parcels Joined View";

      // Field used to connect parcels to the related table.
      const PARCEL_KEY_FIELD = "Parcel_Number";

      // Set to false only if Parcel_Number is a numeric field.
      const PARCEL_NUMBER_IS_TEXT = true;

      // -------------------------------
      // REPORT TITLE DATE
      // -------------------------------

      const today = new Date();
      document.getElementById("reportTitle").textContent =
        "Parcel Map Export: " + today.toLocaleDateString();

      // -------------------------------
      // READ URL PARAMETERS
      // -------------------------------
      // Supported examples:
      // index.html?parcelNumbers=64-001-001-00,64-001-002-00
      // index.html?objectIds=1,2,3

      const params = new URLSearchParams(window.location.search);

      const parcelNumbersFromUrl = params.get("parcelNumbers")
        ? params.get("parcelNumbers").split(",").map(v => v.trim()).filter(Boolean)
        : [];

      const objectIdsFromUrl = params.get("objectIds")
