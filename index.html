<div id="viewDiv" style="height:600px;"></div>

<script src="https://js.arcgis.com/4.30/"></script>

<script>
require([
  "esri/WebMap",
  "esri/views/MapView"
], function(WebMap, MapView){

  const webmap = new WebMap({
    portalItem: {
      id: "ca12623310a1476eb369b7cfebfbdcb9"
    }
  });

  const view = new MapView({
    container: "viewDiv",
    map: webmap
  });

  view.when(function(){
    alert("Map Loaded");
  });

});
</script>
