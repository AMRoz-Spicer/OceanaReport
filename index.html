<h1 id="reportTitle"></h1>

<div id="viewDiv" style="
  width:100%;
  height:600px;
  border:1px solid #999;
"></div>

<div id="legendDiv"></div>

<script src="https://js.arcgis.com/4.30/"></script>

<script>

document.getElementById("reportTitle").textContent =
  "Parcel Map Export: " + new Date().toLocaleDateString();

require([
  "esri/WebMap",
  "esri/views/MapView",
  "esri/widgets/Legend",
  "esri/widgets/ScaleBar"
], function(
  WebMap,
  MapView,
  Legend,
  ScaleBar
){

  const webmap = new WebMap({
    portalItem: {
      id: "ca12623310a1476eb369b7cfebfbdcb9"
    }
  });

  const view = new MapView({
    container: "viewDiv",
    map: webmap
  });

  view.when(function(){

    new Legend({
      view: view,
      container: "legendDiv"
    });

    new ScaleBar({
      view: view,
      unit: "imperial"
    });

  });

});
</script>
